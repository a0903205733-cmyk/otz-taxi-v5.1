<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTZ 司機端 V4.2</title>
<style>
:root{--bg:#0b0b0c;--panel:#18181b;--line:#333;--gold:#d8b64f;--text:#fff;--green:#1fc76a;--blue:#4b89ff;--muted:#aaa}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
header{background:#111;color:var(--gold);padding:18px;font-size:22px;font-weight:800}
main{max-width:760px;margin:auto;padding:16px}.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px}
input,select,button{font:inherit;border-radius:9px;padding:10px 12px;border:1px solid var(--line)}
input,select{background:#242428;color:#fff}button{background:var(--gold);color:#111;font-weight:700;cursor:pointer}
button.green{background:var(--green)}button.blue{background:var(--blue);color:#fff}button.gray{background:#3b3b40;color:#fff}
.route{font-size:18px;font-weight:700;margin:10px 0}.meta{color:var(--muted);line-height:1.7}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
</style>
</head>
<body>
<header>OTZ 司機端 V4.2</header>
<main>
<section id="loginCard" class="card">
  <input id="username" placeholder="司機帳號">
  <input id="password" type="password" placeholder="密碼">
  <button onclick="login()">登入</button>
  <div id="loginMsg"></div>
</section>

<section id="profileCard" class="card" style="display:none">
  <b id="driverName"></b><br>
  <span id="driverInfo"></span><br><br>
  <div id="locationStatus" class="meta">GPS：等待定位授權</div><br>
  <select id="status" onchange="changeStatus()">
    <option value="available">待命</option>
    <option value="busy">載客中</option>
    <option value="offline">離線</option>
  </select>
  <button class="gray" onclick="logout()">登出</button>
</section>

<div id="list"></div>
</main>

<script>
let authToken=localStorage.getItem("otzDriverJwt")||"";
let me=null;
let eventSource=null,previousPending=new Set();
let gpsWatchId=null,lastLocationSentAt=0,lastGpsPosition=null;

async function api(url,opt={}){
  opt.headers={...(opt.headers||{})};
  if(authToken) opt.headers.Authorization=`Bearer ${authToken}`;
  const r=await fetch(url,opt);
  const data=await r.json();
  if(!r.ok) throw new Error(data.error||"操作失敗");
  return data;
}

async function login(){
  try{
    const data=await api("/api/driver/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        username:username.value.trim(),
        password:password.value
      })
    });
    authToken=data.token;
    localStorage.setItem("otzDriverJwt",authToken);
    await init();
  }catch(e){loginMsg.textContent=e.message}
}

async function init(){
  try{
    me=await api("/api/driver/me");
    loginCard.style.display="none";
    profileCard.style.display="block";
    driverName.textContent=me.name;
    driverInfo.textContent=`${me.phone||""}｜${me.plate||""}`;
    status.value=me.status;
    await refresh();
    connectRealtime();
    startGps();
  }catch(e){
    logout();
  }
}

async function refresh(){
  try{
    const orders=await api("/api/driver/orders");
    notifyNewOrders(orders);
    list.innerHTML=orders.length?orders.map(card).join(""):"<div class='card'>目前沒有訂單</div>";
  }catch(e){list.innerHTML=`<div class='card'>${e.message}</div>`}
}

function card(o){
  const mine=Number(o.assigned_driver_id)===Number(me.id);
  return `<section class="card">
    <b>OTZ-${String(o.id).padStart(6,"0")}</b>${o.is_reservation?"｜📅 預約單":""}
    <div class="route">${esc(o.pickup)} → ${esc(o.destination)}</div>
    <div class="meta">
      預約：${esc(o.ride_time||"未提供")}<br>
      人數：${o.passengers||"未提供"} 位<br>
      車資：${o.destination==="尚未提供"?"待確認":`${o.final_fare||o.estimated_fare||0} 元`}
    </div>
    ${o.status==="pending"&&o.pickup_eta_minutes!=null?`<div class="meta">距上車點：約 ${o.pickup_eta_minutes} 分鐘／${o.pickup_distance_km} 公里（Google 最佳駕車路線）</div>`:""}
    <div class="actions">
      ${o.status==="pending"?`<button onclick="claim(${o.id})">我要接單</button>`:""}
      ${mine&&o.status==="accepted"&&!o.started_at?`<button class="blue" onclick="action(${o.id},'start')">開始行程</button>`:""}
      ${mine&&o.status==="accepted"?`<button class="green" onclick="action(${o.id},'complete')">完成訂單</button>`:""}
      <button class="gray" onclick="nav('${encodeURIComponent(o.pickup)}')">導航上車</button>
      ${o.destination!=="尚未提供"?`<button class="gray" onclick="nav('${encodeURIComponent(o.destination)}')">導航目的地</button>`:""}
    </div>
  </section>`;
}

async function claim(id){
  try{
    await api(`/api/driver/orders/${id}/claim`,{method:"POST"});
    await refresh();
  }catch(e){alert(e.message)}
}

async function action(id,actionName){
  if(actionName==="complete"&&!confirm("確定完成訂單？"))return;
  try{
    await api(`/api/driver/orders/${id}/action`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:actionName})
    });
    await init();
  }catch(e){alert(e.message)}
}

async function changeStatus(){
  try{
    await api("/api/driver/status",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({status:status.value})
    });
    await init();
  }catch(e){alert(e.message)}
}

function logout(){
  localStorage.removeItem("otzDriverJwt");
  authToken="";
  me=null;
  loginCard.style.display="block";
  profileCard.style.display="none";
  list.innerHTML="";
  if(eventSource){eventSource.close();eventSource=null}
  if(gpsWatchId!=null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null}
}

function startGps(){
  if(!navigator.geolocation){
    locationStatus.textContent="GPS：此裝置不支援定位，無法接收附近訂單";
    return;
  }
  if(gpsWatchId!=null)return;
  gpsWatchId=navigator.geolocation.watchPosition(sendLocation,locationError,{
    enableHighAccuracy:true,maximumAge:30000,timeout:15000
  });
}

async function sendLocation(position,force=false){
  lastGpsPosition=position;
  const now=Date.now();
  // GPS callbacks can be very frequent. A location heartbeat is enough; the
  // backend controls when a Google route lookup is actually necessary.
  if(!force&&now-lastLocationSentAt<90000)return;
  try{
    await api("/api/driver/location",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        latitude:position.coords.latitude,
        longitude:position.coords.longitude,
        accuracy:position.coords.accuracy
      })
    });
    lastLocationSentAt=now;
    locationStatus.textContent=`GPS：已定位（誤差約 ${Math.round(position.coords.accuracy)} 公尺）`;
    await refresh();
  }catch(e){locationStatus.textContent=`GPS：${e.message}`}
}

function locationError(error){
  const messages={1:"請允許位置權限，否則不會顯示附近訂單",2:"目前無法取得位置",3:"定位逾時，正在重試"};
  locationStatus.textContent=`GPS：${messages[error.code]||error.message}`;
}

function connectRealtime(){
  if(eventSource||!authToken)return;
  eventSource=new EventSource(`/api/events?driverToken=${encodeURIComponent(authToken)}`);
  eventSource.onmessage=()=>refresh();
  eventSource.onerror=()=>{eventSource.close();eventSource=null;setTimeout(connectRealtime,3000)};
}

function notifyNewOrders(orders){
  const pending=new Set(orders.filter(o=>o.status==="pending").map(o=>o.id));
  const added=[...pending].filter(id=>!previousPending.has(id));
  if(previousPending.size&&added.length){
    beep();
    if(Notification.permission==="granted")new Notification("OTZ 新訂單",{body:`新增 ${added.length} 筆待接訂單`});
  }
  previousPending=pending;
  if(Notification.permission==="default")Notification.requestPermission();
}

function beep(){
  const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.12;o.start();o.stop(c.currentTime+.25);
}

function nav(place){
  window.open(`https://www.google.com/maps/search/?api=1&query=${place}`,"_blank");
}

function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}

// Realtime handles ordinary updates. This is only a low-frequency fallback;
// Google route results are cached by the backend.
setInterval(()=>{if(authToken)refresh()},30000);
setInterval(()=>{if(authToken&&lastGpsPosition)sendLocation(lastGpsPosition,true)},90000);
if(authToken)init();
</script>
</body>
</html>
