<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OTZ 車隊管理後台 V5.3.6</title>
<style>
:root{--bg:#0b0b0c;--panel:#171719;--panel2:#232326;--gold:#d8b64f;--text:#f4f4f5;--muted:#aaa;--line:#333;--green:#1fc76a;--red:#e45151;--blue:#4b89ff}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui}
header{background:#111;color:var(--gold);padding:18px 20px;font-size:23px;font-weight:800}
main{max-width:1280px;margin:auto;padding:18px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:14px}
.toolbar,.form{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,select,button{font:inherit;border-radius:9px;border:1px solid var(--line);padding:10px 12px}
input,select{background:var(--panel2);color:var(--text)}button{background:var(--gold);color:#111;font-weight:700;cursor:pointer}
button.red{background:var(--red);color:#fff}button.green{background:var(--green)}button.blue{background:var(--blue);color:#fff}button.gray{background:#3b3b40;color:#fff}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.card{background:var(--panel2);border-radius:12px;padding:14px}
.orders{display:grid;gap:12px}.order{background:var(--panel2);border-radius:12px;padding:14px}.route{font-size:18px;font-weight:700;margin:8px 0}.meta{color:var(--muted);line-height:1.7}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.driver-list,.vehicle-list,.customer-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.grid,.driver-list,.vehicle-list,.customer-list{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.grid,.driver-list,.vehicle-list,.customer-list{grid-template-columns:1fr}input,select,button{width:100%}.actions button{width:auto}}
</style>
</head>
<body>
<header>OTZ 車隊管理後台 V5.3.6</header>
<main>
<section class="panel toolbar">
  <input id="adminToken" type="password" placeholder="管理密碼">
  <button onclick="login()">登入／更新</button>
  <span id="msg"></span>
</section>

<section class="panel">
  <h3>車輛管理</h3>
  <div class="form">
    <input id="vPlate" placeholder="車牌">
    <input id="vBrand" placeholder="廠牌">
    <input id="vModel" placeholder="車型">
    <input id="vColor" placeholder="顏色">
    <input id="vSeats" type="number" min="1" max="20" value="4" placeholder="座位">
    <button onclick="addVehicle()">新增車輛</button>
  </div>
  <div id="vehicles" class="vehicle-list" style="margin-top:12px"></div>
</section>

<section class="panel">
  <h3>新增司機帳號</h3>
  <div class="form">
    <input id="dName" placeholder="姓名">
    <input id="dUsername" placeholder="登入帳號">
    <input id="dPassword" type="password" placeholder="密碼至少8字元">
    <input id="dPhone" placeholder="電話">
    <select id="dRole"><option value="driver">司機</option><option value="dispatcher">調度</option><option value="manager">管理員</option></select>
    <select id="dVehicleId"><option value="">未指派車輛</option></select>
    <button onclick="addDriver()">建立司機</button>
  </div>
</section>

<section class="panel">
  <h3>系統設定</h3>
  <div class="form">
    <input id="sFleetName" placeholder="車隊名稱">
    <input id="sBaseFare" type="number" placeholder="起跳價">
    <input id="sPerKm" type="number" placeholder="每公里">
    <input id="sPerMinute" type="number" placeholder="每分鐘">
    <input id="sNight" type="number" placeholder="夜間加成">
    <input id="sToll" type="number" placeholder="預設高速費">
    <input id="sWelcome" placeholder="LINE 歡迎訊息">
    <input id="sIgnored" placeholder="忽略關鍵字（逗號分隔）">
    <button onclick="saveSettings()">儲存設定</button>
  </div>
</section>

<section class="panel"><h3>客戶管理</h3><div id="customers" class="customer-list"></div></section>
<section class="panel"><h3>操作紀錄</h3><div id="auditLogs" class="meta"></div></section>

<section class="panel">
  <h3>司機管理</h3>
  <label class="meta"><input id="showInactiveDrivers" type="checkbox" onchange="renderDrivers()"> 顯示已停用／封存司機</label>
  <div id="drivers" class="driver-list"></div>
</section>

<section class="panel">
  <h3>未完成訂單</h3>
  <div id="activeOrders" class="orders"></div>
</section>

<section class="panel">
  <h3>已完成訂單</h3>
  <div id="completedOrders" class="orders"></div>
</section>
</main>

<script>
let token=localStorage.getItem("otzAdmin")||"";
let driverData=[],orderData=[],vehicleData=[],customerData=[],auditData=[],settingsData={};
let previousPending=new Set(),eventSource=null;
adminToken.value=token;

async function api(url,opt={}){
  opt.headers={...(opt.headers||{}),"x-admin-token":token};
  const r=await fetch(url,opt);
  const raw=await r.text();
  let data;
  try{data=raw?JSON.parse(raw):{}}catch{throw new Error(`API 回傳格式錯誤（${r.status}）：請確認前後端版本一致`)}
  if(!r.ok) throw new Error(data.error||"操作失敗");
  return data;
}

async function login(){
  token=adminToken.value.trim();
  localStorage.setItem("otzAdmin",token);
  await refresh();
}

async function refresh(){
  try{
    msg.textContent="更新中…";
    [driverData,orderData,vehicleData,customerData,auditData,settingsData]=await Promise.all([
      api("/api/admin/drivers"),
      api("/api/admin/orders"),
      api("/api/admin/vehicles"),
      api("/api/admin/customers"),
      api("/api/admin/audit-logs"),
      api("/api/admin/settings")
    ]);
    notifyNewOrders();
    renderVehicles();
    renderDrivers();
    renderOrders();
    renderCustomers();
    renderAudit();
    renderSettings();
    connectRealtime();
    msg.textContent="已更新";
  }catch(e){msg.textContent=e.message}
}

async function addDriver(){
  try{
    await api("/api/admin/drivers",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name:dName.value.trim(),
        username:dUsername.value.trim(),
        password:dPassword.value,
        phone:dPhone.value.trim(),
        memberRole:dRole.value,
        vehicleId:dVehicleId.value?Number(dVehicleId.value):null
      })
    });
    dName.value=dUsername.value=dPassword.value=dPhone.value="";
    await refresh();
  }catch(e){alert(e.message)}
}

async function addVehicle(){
  try{
    await api("/api/admin/vehicles",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({plate:vPlate.value,brand:vBrand.value,model:vModel.value,color:vColor.value,seats:Number(vSeats.value)})});
    vPlate.value=vBrand.value=vModel.value=vColor.value="";vSeats.value=4;await refresh();
  }catch(e){alert(e.message)}
}

async function toggleVehicle(id){await api(`/api/admin/vehicles/${id}/toggle`,{method:"POST"});await refresh()}

function renderVehicles(){
  vehicles.innerHTML=vehicleData.length?vehicleData.map(v=>`<div class="card"><b>${esc(v.plate)}</b><br>${esc([v.brand,v.model].filter(Boolean).join(" "))}<br>顏色：${esc(v.color||"—")}｜座位：${v.seats}<br>狀態：${v.is_active?"啟用":"停用"}<br><br><button class="${v.is_active?"red":"green"}" onclick="toggleVehicle(${v.id})">${v.is_active?"停用":"啟用"}</button></div>`).join(""):"尚未建立車輛";
  dVehicleId.innerHTML='<option value="">未指派車輛</option>'+vehicleData.filter(v=>v.is_active).map(v=>`<option value="${v.id}">${esc(v.plate)}｜${esc(v.model)}</option>`).join("");
}

async function toggleDriver(id){
  try{
    await api(`/api/admin/drivers/${id}/toggle`,{method:"POST"});
    await refresh();
  }catch(e){alert(e.message)}
}

function renderDrivers(){
  const visibleDrivers=driverData.filter(d=>d.is_active||showInactiveDrivers.checked);
  drivers.innerHTML=visibleDrivers.length?visibleDrivers.map(d=>`
    <div class="card">
      <b>${esc(d.name)}</b><br>
      帳號：${esc(d.username||"未設定")}<br>
      電話：${esc(d.phone||"—")}<br>
      車牌：${esc(d.plate||"—")}<br>
      車型：${esc(d.vehicle||"—")}<br>
      角色：${esc(d.member_role||"driver")}<br>
      狀態：${esc(d.status)}<br>
      啟用：${d.is_active?"是":"否"}<br><br>
      <button class="${d.is_active?"red":"green"}" onclick="toggleDriver(${d.id})">
        ${d.is_active?"停用":"啟用"}
      </button>
    </div>`).join(""):"尚未建立司機";
}

function renderOrders(){
  const card=o=>`
    <div class="order">
      <b>OTZ-${String(o.id).padStart(6,"0")}</b>｜${esc(o.status)}${o.is_reservation?"｜📅 預約單":""}
      <div class="route">${esc(o.pickup)} → ${esc(o.destination)}</div>
      <div class="meta">
        預約：${esc(o.ride_time||"未提供")}｜車資：${o.destination==="尚未提供"?"待確認":`${o.final_fare||o.estimated_fare||0} 元`}<br>
        司機：${esc(o.driver_name||"未指派")}
        ｜付款：${esc(o.payment_status||"unpaid")}
      </div>
      <div class="actions">
        ${o.status==="pending"?`<button class="green" onclick="assign(${o.id},${o.estimated_fare||0})">派單</button>`:""}
        ${o.status==="accepted"?`<button class="blue" onclick="orderAction(${o.id},'complete')">完成</button>`:""}
        ${!["completed","cancelled"].includes(o.status)?`<button class="gray" onclick="editFare(${o.id},${o.final_fare||o.estimated_fare||0})">修改車資</button>`:""}
        ${!["completed","cancelled"].includes(o.status)?`<button class="red" onclick="orderAction(${o.id},'cancel')">取消</button>`:""}
        <button class="gray" onclick="rebook(${o.id})">再次叫車</button>
        ${o.status==="completed"&&o.payment_status!=="paid"?`<button onclick="recordPayment(${o.id},${o.final_fare||o.estimated_fare||0})">收款</button>`:""}
      </div>
    </div>`;
  const active=orderData.filter(o=>!["completed","cancelled"].includes(o.status));
  const completed=orderData.filter(o=>["completed","cancelled"].includes(o.status));
  activeOrders.innerHTML=active.length?active.map(card).join(""):"<div class='meta'>目前沒有未完成訂單</div>";
  completedOrders.innerHTML=completed.length?completed.map(card).join(""):"<div class='meta'>目前沒有已完成訂單</div>";
}

async function rebook(id){const rideTime=prompt("新的預約時間（可留空）","");if(rideTime===null)return;await api(`/api/admin/orders/${id}/rebook`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({rideTime})});await refresh()}
async function recordPayment(id,amount){const method=prompt("付款方式：cash 或 line_pay","cash");if(!method)return;await api(`/api/admin/orders/${id}/payment`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({method,amount})});await refresh()}
async function editFare(id,current){const value=prompt("最終車資",current);if(value===null)return;await api(`/api/admin/orders/${id}/fare`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({finalFare:Number(value)})});await refresh()}

function renderSettings(){sFleetName.value=settingsData.fleet_name||"OTZ 車隊";sBaseFare.value=settingsData.base_fare??60;sPerKm.value=settingsData.per_km??20;sPerMinute.value=settingsData.per_minute??2;sNight.value=settingsData.night_surcharge??0;sToll.value=settingsData.default_toll??0;sWelcome.value=settingsData.line_welcome_message||"";sIgnored.value=(settingsData.ignored_keywords||[]).join(",")}
async function saveSettings(){await api("/api/admin/settings",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({fleet_name:sFleetName.value,base_fare:Number(sBaseFare.value),per_km:Number(sPerKm.value),per_minute:Number(sPerMinute.value),night_surcharge:Number(sNight.value),default_toll:Number(sToll.value),line_welcome_message:sWelcome.value,ignored_keywords:sIgnored.value.split(",").map(x=>x.trim()).filter(Boolean)})});await refresh()}

function renderCustomers(){customers.innerHTML=customerData.length?customerData.map(c=>`<div class="card"><b>${esc(c.name||"LINE 客戶")}</b><br>電話：${esc(c.phone||"未登記")}<br>類型：${esc(c.customer_type)}<br><button class="gray" onclick="editCustomer(${c.id})">編輯</button></div>`).join(""):"尚無客戶資料"}
async function editCustomer(id){const c=customerData.find(x=>x.id===id);const name=prompt("姓名",c.name||"");if(name===null)return;const phone=prompt("電話",c.phone||"");if(phone===null)return;const customer_type=prompt("類型：regular／vip／blacklist",c.customer_type);if(!customer_type)return;const notes=prompt("備註",c.notes||"");await api(`/api/admin/customers/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,phone,customer_type,notes})});await refresh()}
function renderAudit(){auditLogs.innerHTML=auditData.slice(0,50).map(a=>`<div>${new Date(a.created_at).toLocaleString()}｜${esc(a.actor_type)}｜${esc(a.action)}｜${esc(a.entity_type)} ${esc(a.entity_id||"")}</div>`).join("")||"尚無操作紀錄"}

function connectRealtime(){if(eventSource||!token)return;eventSource=new EventSource(`/api/events?adminToken=${encodeURIComponent(token)}`);eventSource.onmessage=()=>refresh();eventSource.onerror=()=>{eventSource.close();eventSource=null;setTimeout(connectRealtime,3000)}}
function notifyNewOrders(){const pending=new Set(orderData.filter(o=>o.status==="pending").map(o=>o.id));const added=[...pending].filter(id=>!previousPending.has(id));if(previousPending.size&&added.length){beep();if(Notification.permission==="granted")new Notification("OTZ 新訂單",{body:`新增 ${added.length} 筆待接訂單`})}previousPending=pending;if(Notification.permission==="default")Notification.requestPermission()}
function beep(){const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.value=.12;o.start();o.stop(c.currentTime+.25)}

async function assign(id,estimate){
  const available=driverData.filter(d=>d.is_active);
  if(!available.length){alert("請先建立並啟用司機");return}
  const choice=prompt(
    "請輸入司機前面的選擇編號\n"+
    available.map((d,index)=>`${index+1}：${d.name}（帳號：${d.username||"未設定"}／${d.status}）`).join("\n")
  );
  if(!choice)return;
  const selected=available[Number(choice)-1];
  if(!selected){alert("司機選擇編號不正確，請重新選擇");return}
  const finalFare=prompt("確認最終車資",estimate);
  if(finalFare===null)return;
  if(!Number.isFinite(Number(finalFare))||Number(finalFare)<0){alert("車資格式不正確");return}
  try{
    await api(`/api/admin/orders/${id}/assign`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({driverId:selected.id,finalFare:Number(finalFare)})
    });
    await refresh();
  }catch(e){alert(e.message)}
}

async function orderAction(id,action){
  if(!confirm("確定執行？"))return;
  try{
    await api(`/api/admin/orders/${id}/action`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action})
    });
    await refresh();
  }catch(e){alert(e.message)}
}

function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]))}
if(token)refresh();
</script>
</body>
</html>
